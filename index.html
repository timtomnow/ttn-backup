<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ttn-backup">
  <title>ttn-backup</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-title">
        <span class="topbar-logo">⛂</span>
        <span class="topbar-text">ttn-backup</span>
      </div>
      <button id="topbar-action" class="btn-primary" onclick="runBackupAll()">Backup all</button>
    </header>

    <main id="main"><!-- page content injected here --></main>

    <nav id="bottom-nav">
      <button class="bottom-nav-item" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="bn-icon">⌂</span><span class="bn-label">Home</span>
      </button>
      <button class="bottom-nav-item" data-page="apps" onclick="navigate('apps')">
        <span class="bn-icon">▤</span><span class="bn-label">Apps</span>
      </button>
      <button class="bottom-nav-item" data-page="history" onclick="navigate('history')">
        <span class="bn-icon">↻</span><span class="bn-label">History</span>
      </button>
      <button class="bottom-nav-item" data-page="schedules" onclick="navigate('schedules')">
        <span class="bn-icon">⏰</span><span class="bn-label">Schedules</span>
      </button>
      <button class="bottom-nav-item" data-page="settings" onclick="navigate('settings')">
        <span class="bn-icon">⚙</span><span class="bn-label">Settings</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay">
    <div id="modal"></div>
  </div>

  <div id="toast-container"></div>

  <iframe id="snapshot-frame" title="ttn-backup worker frame" sandbox="allow-scripts allow-same-origin" style="display:none"></iframe>

  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/apps.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/schedules.js"></script>
  <script src="js/pages/settings.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
